      /* GLASS EFFECT */
      .bg {

        inset: 0;
        backdrop-filter: blur(14px);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);

      /* TITLE */

      /* HOVER */
